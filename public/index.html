<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matin Chat 3.0</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<header class="topbar">
<div class="logo">🚀 Matin Chat</div>

<div class="online-box">
<span id="onlineCount">0</span>
آنلاین
</div>
</header>

<div class="login-box">

<input
id="username"
type="text"
placeholder="نام کاربری">

<button id="joinBtn">
ورود
</button>

</div>

<div id="chatArea">

<div id="messages"></div>

<div class="send-box">

<input
id="messageInput"
type="text"
placeholder="پیام بنویس...">

<button id="sendBtn">
ارسال
</button>

</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
