<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>متین‌گرام</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

<!-- ======== صفحه ثبت نام ======== -->
<div id="auth-page">
  <div class="auth-box">
    <div class="auth-logo"><i class="fas fa-paper-plane"></i> متین‌گرام</div>
    <p class="auth-sub">بهترین پیام‌رسان ایرانی</p>
    
    <div id="phone-step">
      <div class="input-group">
        <i class="fas fa-phone"></i>
        <input type="tel" id="phone-input" placeholder="0912 345 6789" maxlength="11">
      </div>
      <button id="send-code-btn" class="btn-primary">ارسال کد تایید</button>
      <div id="auth-error" class="error"></div>
    </div>
    
    <div id="code-step" style="display:none">
      <p class="code-hint">کد ۶ رقمی را وارد کنید</p>
      <div class="code-display" id="code-display"></div>
      <div class="input-group">
        <i class="fas fa-shield-alt"></i>
        <input type="text" id="code-input" placeholder="_ _ _ _ _ _" maxlength="6">
      </div>
      <button id="verify-btn" class="btn-primary">تایید و ورود</button>
      <button id="resend-code-btn" class="btn-secondary">ارسال مجدد کد</button>
    </div>
  </div>
</div>

<!-- ======== برنامه اصلی ======== -->
<div id="app" style="display:none">
  
  <!-- ===== نوار کناری ===== -->
  <div id="sidebar">
    <div class="sidebar-header">
      <h2><i class="fas fa-paper-plane"></i> متین‌گرام</h2>
      <div class="header-actions">
        <button id="theme-toggle"><i class="fas fa-moon"></i></button>
        <button id="profile-btn"><i class="fas fa-user-circle"></i></button>
      </div>
    </div>
    
    <div class="tabs">
      <button class="tab active" data-tab="chats"><i class="fas fa-comment"></i> چت‌ها</button>
      <button class="tab" data-tab="groups"><i class="fas fa-users"></i> گروه‌ها</button>
    </div>
    
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="search-input" placeholder="جستجوی مخاطب...">
    </div>
    
    <div id="contact-list"></div>
    
    <div class="sidebar-footer">
      <div class="user-status" id="my-status">🟢 آنلاین</div>
      <button id="new-group-btn"><i class="fas fa-user-plus"></i></button>
      <button id="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>

  <!-- ===== پنجره چت ===== -->
  <div id="chat-window">
    <div class="chat-header">
      <div id="chat-contact-info">
        <div id="chat-avatar" class="chat-avatar"></div>
        <div>
          <div id="chat-contact-name">انتخاب مخاطب</div>
          <div id="chat-contact-status">آخرین بازدید</div>
        </div>
      </div>
      <div class="chat-actions">
        <button id="chat-info-btn"><i class="fas fa-info-circle"></i></button>
        <button id="chat-settings-btn"><i class="fas fa-ellipsis-v"></i></button>
      </div>
    </div>
    
    <div id="messages-container"></div>
    
    <div id="typing-indicator" class="typing"></div>
    
    <div class="chat-input-area">
      <button id="emoji-btn"><i class="fas fa-smile"></i></button>
      <button id="attach-btn"><i class="fas fa-paperclip"></i></button>
      <input type="text" id="message-input" placeholder="پیام بنویس...">
      <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
      <input type="file" id="file-input" style="display:none" multiple>
    </div>
  </div>

  <!-- ===== پنل پروفایل ===== -->
  <div id="profile-panel" style="display:none">
    <div class="panel-header">
      <h3><i class="fas fa-user-cog"></i> پروفایل</h3>
      <button id="close-panel"><i class="fas fa-times"></i></button>
    </div>
    
    <div class="profile-avatar-section">
      <div class="profile-avatar">
        <img id="profile-avatar-img" src="" alt="avatar">
        <div class="avatar-overlay" id="change-avatar-btn">
          <i class="fas fa-camera"></i>
        </div>
      </div>
      <input type="file" id="avatar-input" style="display:none" accept="image/*">
    </div>
    
    <div class="profile-fields">
      <div class="profile-field">
        <label><i class="fas fa-user"></i> نام کامل</label>
        <input type="text" id="profile-fullname" placeholder="نام و نام خانوادگی">
      </div>
      <div class="profile-field">
        <label><i class="fas fa-at"></i> نام کاربری</label>
        <input type="text" id="profile-username" placeholder="نام کاربری">
      </div>
      <div class="profile-field">
        <label><i class="fas fa-phone"></i> شماره موبایل</label>
        <input type="text" id="profile-phone" disabled>
      </div>
      <div class="profile-field">
        <label><i class="fas fa-info-circle"></i> بیوگرافی</label>
        <textarea id="profile-bio" placeholder="درباره خودت بنویس..."></textarea>
      </div>
      <div class="profile-field row">
        <div>
          <label><i class="fas fa-calendar"></i> سن</label>
          <input type="number" id="profile-age" placeholder="سن">
        </div>
        <div>
          <label><i class="fas fa-venus-mars"></i> جنسیت</label>
          <select id="profile-gender">
            <option value="">انتخاب</option>
            <option value="male">مرد</option>
            <option value="female">زن</option>
            <option value="other">سایر</option>
          </select>
        </div>
      </div>
      <div class="profile-field">
        <label><i class="fas fa-envelope"></i> ایمیل</label>
        <input type="email" id="profile-email" placeholder="ایمیل">
      </div>
      <div class="profile-field">
        <label><i class="fas fa-globe"></i> وبسایت</label>
        <input type="text" id="profile-website" placeholder="وبسایت">
      </div>
      <div class="profile-field">
        <label><i class="fas fa-map-marker-alt"></i> مکان</label>
        <input type="text" id="profile-location" placeholder="شهر، کشور">
      </div>
    </div>
    
    <div class="profile-actions">
      <button id="save-profile-btn" class="btn-primary"><i class="fas fa-save"></i> ذخیره تغییرات</button>
    </div>
  </div>

  <!-- ===== پنل تنظیمات ===== -->
  <div id="settings-panel" style="display:none">
    <div class="panel-header">
      <h3><i class="fas fa-cog"></i> تنظیمات</h3>
      <button id="close-settings"><i class="fas fa-times"></i></button>
    </div>
    
    <div class="settings-section">
      <h4>ظاهر</h4>
      <div class="settings-item">
        <label>تم</label>
        <select id="settings-theme">
          <option value="dark">تاریک</option>
          <option value="light">روشن</option>
        </select>
      </div>
      <div class="settings-item">
        <label>اندازه فونت</label>
        <select id="settings-font-size">
          <option value="small">کوچک</option>
          <option value="medium">متوسط</option>
          <option value="large">بزرگ</option>
        </select>
      </div>
      <div class="settings-item">
        <label>نوع فونت</label>
        <select id="settings-font-family">
          <option value="default">پیش‌فرض</option>
          <option value="vazir">وزیر</option>
          <option value="yekan">یکان</option>
          <option value="tahoma">Tahoma</option>
        </select>
      </div>
    </div>
    
    <div class="settings-section">
      <h4>اعلان‌ها</h4>
      <div class="settings-item">
        <label>اعلان‌ها</label>
        <input type="checkbox" id="settings-notifications">
      </div>
      <div class="settings-item">
        <label>صدا</label>
        <input type="checkbox" id="settings-sound">
      </div>
    </div>
    
    <button id="save-settings-btn" class="btn-primary"><i class="fas fa-save"></i> ذخیره تنظیمات</button>
  </div>

  <!-- ===== پنل اطلاعات مخاطب ===== -->
  <div id="contact-info-panel" style="display:none">
    <div class="panel-header">
      <h3><i class="fas fa-info-circle"></i> اطلاعات مخاطب</h3>
      <button id="close-contact-info"><i class="fas fa-times"></i></button>
    </div>
    <div id="contact-info-content"></div>
  </div>
</div>

<!-- ======== اموجی‌پیکر ======== -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.19.0/dist/emojipicker.css">
<script type="module">
  import { EmojiPicker } from 'https://cdn.jsdelivr.net/npm/emoji-picker-element@1.19.0/dist/emojipicker.js';
  window.emojiPicker = new EmojiPicker();
  document.body.appendChild(window.emojiPicker);
  window.emojiPicker.style.display = 'none';
</script>

<script src="/app.js"></script>
</body>
</html>
