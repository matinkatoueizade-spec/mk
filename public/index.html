<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Matin Chat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0f172a;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#17212b;
padding:15px;
color:white;
font-size:20px;
font-weight:bold;
text-align:center;
}

#login{
padding:20px;
display:flex;
gap:10px;
background:#111827;
}

#username{
flex:1;
padding:10px;
border:none;
border-radius:10px;
}

#joinBtn{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
background:#2563eb;
color:white;
padding:10px;
border-radius:15px;
max-width:80%;
word-wrap:break-word;
}

.time{
font-size:11px;
opacity:.7;
margin-top:4px;
}

.input-area{
display:flex;
padding:10px;
background:#111827;
gap:10px;
}

#msg{
flex:1;
padding:12px;
border:none;
border-radius:12px;
}

button{
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
🚀 Matin Chat
</div>

<div id="login">
<input id="username" placeholder="نام کاربری">
<button id="joinBtn">ورود</button>
</div>

<div id="messages"></div>

<div class="input-area">
<input id="msg" placeholder="پیام بنویس...">
<button onclick="sendMessage()">ارسال</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let username = "Guest";

document.getElementById("joinBtn").onclick = () => {
const name = document.getElementById("username").value.trim();

if(name){
username = name;
alert("خوش اومدی " + username);
}
};

socket.on("chat message", data => {

const div = document.createElement("div");
div.className = "message";

const now = new Date();

div.innerHTML =
"<b>"+data.user+"</b><br>"+
data.text+
"<div class='time'>"+
now.getHours()+":"+
String(now.getMinutes()).padStart(2,"0")+
"</div>";

document.getElementById("messages").appendChild(div);

document.getElementById("messages").scrollTop =
document.getElementById("messages").scrollHeight;
});

function sendMessage(){

const input = document.getElementById("msg");

if(!input.value.trim()) return;

socket.emit("chat message",{
user: username,
text: input.value
});

input.value="";
}
</script>

</body>
</html>
