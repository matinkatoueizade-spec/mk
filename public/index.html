<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>چت‌روم متین</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

  <!-- صفحه ثبت نام -->
  <div id="register-page">
    <div class="register-box">
      <h1>💬 چت‌روم متین</h1>
      <p>یک نام انتخاب کن</p>
      <input type="text" id="username" placeholder="نام شما..." maxlength="20">
      <button id="join-btn">ورود</button>
      <div id="error-msg"></div>
    </div>
  </div>

  <!-- صفحه چت -->
  <div id="chat-page" class="hidden">
    <div class="header">
      <span>💬 چت‌روم متین</span>
      <div class="header-left">
        <span id="counter">👤 0</span>
        <button id="logout">🚪 خروج</button>
      </div>
    </div>

    <div class="online-bar">
      <span class="label">🟢 آنلاین‌ها:</span>
      <div id="online-list"></div>
    </div>

    <div id="messages"></div>

    <div id="typing-indicator"></div>

    <div class="input-area">
      <input type="text" id="input" placeholder="پیامت را بنویس..." autofocus>
      <button id="send">📤</button>
    </div>
  </div>

  <script>
    // ---------- همه چیز در یک تگ ----------
    const socket = io({ transports: ['websocket', 'polling'] });

    // عناصر
    const registerPage = document.getElementById('register-page');
    const chatPage = document.getElementById('chat-page');
    const usernameInput = document.getElementById('username');
    const joinBtn = document.getElementById('join-btn');
    const errorMsg = document.getElementById('error-msg');
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const counter = document.getElementById('counter');
    const onlineList = document.getElementById('online-list');
    const typingIndicator = document.getElementById('typing-indicator');
    const logoutBtn = document.getElementById('logout');

    let myId = null;
    let isTyping = false;
    let typingTimer = null;

    // ---------- ثبت نام ----------
    joinBtn.addEventListener('click', () => {
      const name = usernameInput.value.trim();
      if (!name) { errorMsg.textContent = 'نام را وارد کن'; return; }
      if (name.length < 2) { errorMsg.textContent = 'حداقل ۲ حرف'; return; }
      errorMsg.textContent = '';
      socket.emit('register', name);
    });

    usernameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') joinBtn.click();
    });

    // ---------- رویدادهای سوکت ----------
    socket.on('registered', (data) => {
      registerPage.classList.add('hidden');
      chatPage.classList.remove('hidden');
      input.focus();
    });

    socket.on('history', (msgs) => {
      messagesDiv.innerHTML = '';
      msgs.forEach(msg => addMessage(msg));
      scrollDown();
    });

    socket.on('message', (msg) => {
      addMessage(msg);
      scrollDown();
    });

    socket.on('user_joined', (data) => {
      updateOnlineList(data.onlineList);
      counter.textContent = `👤 ${data.onlineList.length}`;
      addSystemMessage(`${data.username} وارد شد`);
    });

    socket.on('user_left', (data) => {
      addSystemMessage(`${data.username} خارج شد`);
    });

    socket.on('online_list', (list) => {
      updateOnlineList(list);
    });

    socket.on('user_count', (count) => {
      counter.textContent = `👤 ${count}`;
    });

    socket.on('typing_status', (data) => {
      if (data.userId === socket.id) return;
      if (data.isTyping) {
        typingIndicator.textContent = `✍️ ${data.username} در حال تایپ...`;
      } else {
        typingIndicator.textContent = '';
      }
    });

    // ---------- توابع UI ----------
    function addMessage(msg) {
      const isMine = msg.userId === socket.id;
      const div = document.createElement('div');
      div.className = `msg ${isMine ? 'mine' : 'other'}`;
      div.innerHTML = `
        <div class="bubble">
          <span class="name" style="color:${msg.color || '#ccc'}">${msg.username}</span>
          <span class="text">${msg.text}</span>
          <span class="time">${msg.time}</span>
        </div>
      `;
      messagesDiv.appendChild(div);
    }

    function addSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'msg system';
      div.textContent = `🔄 ${text}`;
      messagesDiv.appendChild(div);
      scrollDown();
    }

    function updateOnlineList(list) {
      onlineList.innerHTML = '';
      list.forEach(user => {
        const span = document.createElement('span');
        span.className = 'badge';
        span.innerHTML = `<span class="dot" style="background:${user.color}"></span> ${user.username}`;
        onlineList.appendChild(span);
      });
    }

    function scrollDown() {
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      socket.emit('message', text);
      input.value = '';
      input.focus();
      clearTimeout(typingTimer);
      socket.emit('typing', false);
      typingIndicator.textContent = '';
    }

    // ---------- رویدادهای چت ----------
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
    });

    input.addEventListener('input', () => {
      const hasText = input.value.trim().length > 0;
      if (hasText && !isTyping) {
        isTyping = true;
        socket.emit('typing', true);
      } else if (!hasText && isTyping) {
        isTyping = false;
        socket.emit('typing', false);
        typingIndicator.textContent = '';
      }
      clearTimeout(typingTimer);
      if (hasText) {
        typingTimer = setTimeout(() => {
          isTyping = false;
          socket.emit('typing', false);
          typingIndicator.textContent = '';
        }, 1200);
      }
    });

    logoutBtn.addEventListener('click', () => {
      socket.disconnect();
      location.reload();
    });

    // ---------- شروع ----------
    registerPage.classList.remove('hidden');
    chatPage.classList.add('hidden');
  </script>
</body>
</html>
